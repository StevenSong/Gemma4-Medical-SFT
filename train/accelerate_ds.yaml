compute_environment: LOCAL_MACHINE
distributed_type: DEEPSPEED
mixed_precision: bf16

deepspeed_config:
  deepspeed_config_file: ds_zero3.json
  zero3_init_flag: true
  deepspeed_multinode_launcher: standard

num_machines: 2
num_processes: 8
machine_rank: 0            # override per node on the CLI
main_process_ip: 10.32.12.33  # node0's IP on the fabric NCCL can reach
main_process_port: 29500

rdzv_backend: c10d
same_network: true
use_cpu: false